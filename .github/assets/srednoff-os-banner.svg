<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Srednoff OS banner</title>
  <desc id="desc">A dark technical banner for Srednoff OS with capability and selector motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="0.45" stop-color="#111827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="line" x1="100" y1="80" x2="1180" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.62 0 0 0 0 1 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <path d="M85 320C205 196 300 160 430 196C558 232 603 122 732 116C855 111 899 205 1018 178C1097 160 1158 105 1205 70" stroke="url(#line)" stroke-width="3" opacity="0.75"/>
  <path d="M110 106H356M110 146H270M110 186H330" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <path d="M916 276H1170M1002 316H1170M952 356H1170" stroke="#22C55E" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <g opacity="0.22">
    <circle cx="216" cy="308" r="88" stroke="#38BDF8"/>
    <circle cx="216" cy="308" r="54" stroke="#38BDF8"/>
    <circle cx="1050" cy="132" r="96" stroke="#8B5CF6"/>
    <circle cx="1050" cy="132" r="58" stroke="#8B5CF6"/>
  </g>

  <g filter="url(#soft-glow)">
    <rect x="474" y="74" width="332" height="272" rx="26" fill="#0F172A" stroke="url(#line)" stroke-width="2"/>
    <rect x="508" y="112" width="264" height="34" rx="9" fill="#111827" stroke="#38BDF8" stroke-opacity="0.35"/>
    <rect x="508" y="166" width="126" height="92" rx="14" fill="#111827" stroke="#8B5CF6" stroke-opacity="0.45"/>
    <rect x="646" y="166" width="126" height="92" rx="14" fill="#111827" stroke="#22C55E" stroke-opacity="0.45"/>
    <rect x="508" y="278" width="264" height="30" rx="9" fill="#111827" stroke="#F59E0B" stroke-opacity="0.45"/>
  </g>

  <text x="640" y="138" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#E5E7EB">QUALITY / COST SELECTOR</text>
  <text x="571" y="210" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#93C5FD">306</text>
  <text x="571" y="236" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#CBD5E1">SKILLS</text>
  <text x="709" y="210" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#86EFAC">4500</text>
  <text x="709" y="236" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#CBD5E1">CAPABILITIES</text>
  <text x="640" y="299" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#FDE68A">RIGHT SKILL. RIGHT CONTEXT. RIGHT COST.</text>

  <text x="82" y="118" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="900" fill="#F8FAFC">Srednoff OS</text>
  <text x="86" y="164" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#BAE6FD">An engineering operating layer for Codex</text>
  <text x="88" y="208" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="500" fill="#CBD5E1">startup checks  /  skill routing  /  safety gates  /  source ranking</text>

  <g>
    <rect x="88" y="248" width="130" height="36" rx="18" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.55"/>
    <text x="153" y="272" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#E0F2FE">CODEX</text>
    <rect x="230" y="248" width="118" height="36" rx="18" fill="#0F172A" stroke="#8B5CF6" stroke-opacity="0.55"/>
    <text x="289" y="272" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#EDE9FE">AGENTS</text>
    <rect x="360" y="248" width="104" height="36" rx="18" fill="#0F172A" stroke="#22C55E" stroke-opacity="0.55"/>
    <text x="412" y="272" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#DCFCE7">ROI</text>
  </g>

  <text x="1160" y="336" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#F8FAFC">v2.1.2</text>
  <text x="1160" y="364" text-anchor="end" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#CBD5E1">shareable public export</text>
</svg>
